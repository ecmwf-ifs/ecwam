grid:        lam_highres 
cldomain:     m
directions:  36
frequencies: 36
fr1:         0.055
ifre1:       1
bathymetry:  ETOPO1
lsubgrid:    F

advection:
    irefra: 0
    timestep: 120
    fast_waves:
        timestep: 60
        max_frequency: 5
physics:
    iphys: 1
    timestep: 240
    llgcbz0: T
    llnormagam: T
    lmaskice: F
    lciwa3: T
    lciscal: T

analysis.begin: 2022-12-31 12:00:00
analysis.end:   2023-01-01 00:00:00
forecast.begin: 2023-01-01 00:00:00
forecast.end:   2023-01-01 06:00:00

begin: ${analysis.begin}
end:   ${forecast.end}

nproma: 24
lgribin: F
lgribout: F

forcings:
    sea_ice: False 

    file:  data/forcings/oper_an_12h_fc_2023010100_36h_O1280.grib

    at:
      - begin:     ${analysis.begin}
        end:       ${analysis.end}
        timestep:  06:00
      - begin:     ${forecast.begin}
        end:       ${forecast.end}
        timestep:  01:00

output:
    fields:
        name:
          - swh         # Significant height of combined wind waves and swell
          - mwd         # Mean wave direction
          - mwp         # Mean wave period
          - pp1d        # Peak wave period
          - dwi         # 10 metre wind direction
          - cdww        # Coefficient of drag with waves
          - wind        # 10 metre wind speed
        format: grib    # (default : grib) or binary
        at:
          - timestep: 01:00

    restart:
        format: binary # (default : binary) or grib
        at:
          - time: ${analysis.end}


validation:

  double_precision:

    # initial analysis time
    - name: swh
      time: 2022-12-31 12:00:00
      average: 3.188565402145367e-01
      relative_tolerance: 1.e-14
      hashes: ['0x3FD46825431593C4']

    # initial forecast time
    - name: swh
      time: 2023-01-01 00:00:00
      average: 2.297867064718079e-01
      hashes: ['0x3FCD69A69AAD0D3D']

    # 6h into forcast
    - name: swh
      time: 2023-01-01 06:00:00
      average: 2.531205436037192e-01
      relative_tolerance: 1.e-14
      hashes: ['0x3FD03320822E515C']
    - name: swh
      time: 2023-01-01 06:00:00
      minimum: 1.261118225844372e-02
      relative_tolerance: 1.e-14
      hashes: ['0x3F89D3E43AE94A44']
    - name: swh
      time: 2023-01-01 06:00:00
      maximum: 9.275915911218660e-01
      relative_tolerance: 1.e-14
      hashes: ['0x3FEDAED48F7D3772']
