grid:        lam_highres 
cldomain:     m
directions:  36
frequencies: 36
fr1:         0.055
ifre1:       1
bathymetry:  ETOPO1

advection:
    timestep: 120
    fast_waves:
        timestep: 60
        max_frequency: 5
physics:
    timestep: 240

analysis.begin: 2022-12-31 12:00:00
analysis.end:   2023-01-01 00:00:00
forecast.begin: 2023-01-01 00:00:00
forecast.end:   2023-01-01 06:00:00

begin: ${analysis.begin}
end:   ${forecast.end}

nproma: 24
llgcbz0: T
llnormagam: T
lciwa3: T
lciscal: T

forcings:
    sea_ice: True 

    file:  data/forcings/oper_an_12h_fc_2023010100_36h_O1280.grib

    at:
      - begin:     ${analysis.begin}
        end:       ${analysis.end}
        timestep:  06:00
      - begin:     ${forecast.begin}
        end:       ${forecast.end}
        timestep:  01:00

output:
    fields:
        name:
          - swh         # Significant height of combined wind waves and swell
          - mwd         # Mean wave direction
          - mwp         # Mean wave period
          - pp1d        # Peak wave period
          - dwi         # 10 metre wind direction
          - cdww        # Coefficient of drag with waves
          - wind        # 10 metre wind speed
        format: grib    # (default : grib) or binary
        at:
          - timestep: 01:00

    restart:
        format: binary # (default : binary) or grib
        at:
          - time: ${end}


validation:

  double_precision:

    # initial analysis time
    - name: swh
      time: 2022-12-31 12:00:00
      average: 3.187297962906810e-01
      relative_tolerance: 1.e-14
      hashes: ['0x3FD46611A8D511E4']

    # initial forecast time
    - name: swh
      time: 2023-01-01 00:00:00
      average: 2.302391668008772e-01 
      hashes: ['0x3FCD787A1DD582E1']

    # 6h into forcast
    - name: swh
      time: 2023-01-01 06:00:00
      average: 2.536693790443732e-01 
      relative_tolerance: 1.e-14
      hashes: ['0x3FD03C1E7DBF8061']
    - name: swh
      time: 2023-01-01 06:00:00
      minimum: 2.172002527339524e-02 
      relative_tolerance: 1.e-14
      hashes: ['0x3F963DC638DEBF23']
    - name: swh
      time: 2023-01-01 06:00:00
      maximum: 9.275511810397952e-01 
      relative_tolerance: 1.e-14
      hashes: ['0x3FEDAE7FD07DD3BA']
