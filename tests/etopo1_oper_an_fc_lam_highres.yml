grid:        lam_highres 
cldomain:     m
directions:  36
frequencies: 36
fr1:         0.055
ifre1:       1
bathymetry:  ETOPO1
lsubgrid:    F

advection:
    irefra: 0
    timestep: 90
    fast_waves:
        timestep: 45
        max_frequency: 5
physics:
    iphys: 1
    timestep: 180
    llgcbz0: T
    llnormagam: T
    lmaskice: F
    lciwa3: T
    lciscal: T

analysis.begin: 2022-12-31 12:00:00
analysis.end:   2023-01-01 00:00:00
forecast.begin: 2023-01-01 00:00:00
forecast.end:   2023-01-01 06:00:00

begin: ${analysis.begin}
end:   ${forecast.end}

nproma: 24
lgribin: F
lgribout: F

forcings:
    sea_ice: False 

    file:  data/forcings/oper_an_12h_fc_2023010100_36h_O1280.grib

    at:
      - begin:     ${analysis.begin}
        end:       ${analysis.end}
        timestep:  06:00
      - begin:     ${forecast.begin}
        end:       ${forecast.end}
        timestep:  01:00

output:
    fields:
        name:
          - swh         # Significant height of combined wind waves and swell
          - mwd         # Mean wave direction
          - mwp         # Mean wave period
          - pp1d        # Peak wave period
          - dwi         # 10 metre wind direction
          - cdww        # Coefficient of drag with waves
          - wind        # 10 metre wind speed
        format: grib    # (default : grib) or binary
        at:
          - timestep: 01:00

    restart:
        format: binary # (default : binary) or grib
        at:
          - time: ${analysis.end}


validation:

  double_precision:

    # initial analysis time
    - name: swh
      time: 2022-12-31 12:00:00
      average: 2.779599034388384e-01
      relative_tolerance: 1.e-14
      hashes: ['0x3FD1CA1855B79FCE']

    # initial forecast time
    - name: swh
      time: 2023-01-01 00:00:00
      average: 2.420364921801725e-01
      hashes: ['0x3FCEFB0D412D1B77']

    # 6h into forcast
    - name: swh
      time: 2023-01-01 06:00:00
      average: 2.628913168004307e-01
      relative_tolerance: 1.e-14
      hashes: ['0x3FD0D3361A03DABB']
    - name: swh
      time: 2023-01-01 06:00:00
      minimum: 1.310494308392263e-02 
      relative_tolerance: 1.e-14
      hashes: ['0x3F8AD6C3AFB0ECC2']
    - name: swh
      time: 2023-01-01 06:00:00
      maximum: 9.323344269830584e-01
      relative_tolerance: 1.e-14
      hashes: ['0x3FEDD5AF021A77E5']
