grid:        O1280
cldomain:     g
directions:  36
frequencies: 29
fr1:         4.177248E-02 
ifre1:       3
bathymetry:  ETOPO1
lsubgrid:    T

advection:
    irefra: 2
    timestep: 450 
    fast_waves:
        timestep: 225
        max_frequency: 7
physics:
    iphys: 1
    timestep: 900
    llgcbz0: T
    llnormagam: T
    lmaskice: F
    lciwa3: T
    lciscal: T

analysis.begin: 2022-12-31 12:00:00
analysis.end:   2023-01-01 00:00:00
forecast.begin: 2023-01-01 00:00:00
forecast.end:   2023-01-01 06:00:00

begin: ${analysis.begin}
end:   ${forecast.end}

nproma: 24
lgribin: F
lgribout: F

forcings:
    file:  data/forcings/oper_an_12h_fc_2023010100_36h_O1280.grib

    at:
      - begin:     ${analysis.begin}
        end:       ${analysis.end}
        timestep:  06:00
      - begin:     ${forecast.begin}
        end:       ${forecast.end}
        timestep:  01:00

currents:
    file:  data/forcings/daily_average_surface_currents_ORAS6_20221231_20230102_O1280.grib
    input_step: 86400 

output:
    fields:
        name:
          - swh         # Significant height of combined wind waves and swell
          - mwd         # Mean wave direction
          - mwp         # Mean wave period
          - pp1d        # Peak wave period
          - dwi         # 10 metre wind direction
          - cdww        # Coefficient of drag with waves
          - wind        # 10 metre wind speed
        format: grib    # (default : grib) or binary
        at:
          - timestep: 01:00

    restart:
        format: binary # (default : binary) or grib
        at:
          - time: ${analysis.end}


validation:

  double_precision:

    # initial analysis time
    - name: swh
