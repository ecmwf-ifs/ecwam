grid:        O640
cldomain:     g
directions:  36
frequencies: 29
fr1:         4.177248E-02 
ifre1:       3
bathymetry:  ETOPO1
lsubgrid:    T

advection:
    irefra: 2
    timestep: 720 
    fast_waves:
        timestep: 360
        max_frequency: 4
physics:
    iphys: 1
    timestep: 720
    llgcbz0: T
    llnormagam: T
    lmaskice: F
    lciwa3: T
    lciscal: T

analysis.begin: 2022-12-31 12:00:00
analysis.end:   2023-01-01 00:00:00
forecast.begin: 2023-01-01 00:00:00
forecast.end:   2023-01-01 06:00:00

begin: ${analysis.begin}
end:   ${forecast.end}

nproma: 24
lgribin: F
lgribout: F

forcings:
    file:  data/forcings/oper_an_12h_fc_2023010100_36h_O640.grib

    at:
      - begin:     ${analysis.begin}
        end:       ${analysis.end}
        timestep:  06:00
      - begin:     ${forecast.begin}
        end:       ${forecast.end}
        timestep:  01:00

currents:
    file:  data/forcings/daily_average_surface_currents_ORAS6_20221231_20230102_O640.grib
    input_step: 86400 

output:
    fields:
        name:
          - swh         # Significant height of combined wind waves and swell
          - mwd         # Mean wave direction
          - mwp         # Mean wave period
          - pp1d        # Peak wave period
          - dwi         # 10 metre wind direction
          - cdww        # Coefficient of drag with waves
          - wind        # 10 metre wind speed
        format: grib    # (default : grib) or binary
        at:
          - timestep: 01:00

    restart:
        format: binary # (default : binary) or grib
        at:
          - time: ${analysis.end}


validation:

  double_precision:

    # initial analysis time
    - name: swh
      time: 2022-12-31 12:00:00
      average: 3.875267447586148e-01 
      relative_tolerance: 1.e-14
      hashes: ['0x3FD8CD3CF9C411DC']

    # initial forecast time
    - name: swh
      time: 2023-01-01 00:00:00
      average: 1.054427510278385e+00 
      relative_tolerance: 1.e-14
      hashes: ['0x3FF0DEEF618A5FB6']

    # 6h into forcast
